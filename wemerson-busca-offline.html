      if (S.history.length > 0) h += '<div style="text-align:right;margin-top:10px"><button data-action="clear" style="background:none;border:none;color:var(--faint);font-size:12px;cursor:pointer;text-decoration:underline">limpar hist&oacute;rico</button></div>';
    }

    app.innerHTML = h;
    var chat = document.getElementById("chat");
    if (chat) chat.scrollTop = chat.scrollHeight;
    var f = app.querySelector("[autofocus]");
    if (f) f.focus();
  }

  function doSearch() {
    var q = S.input.trim();
    if (!q) return;
    S.error = "";
    var mode = S.mode;
    var results = runSearch(q, mode);
    S.history = S.history.concat([{ question: q, mode: mode, results: results, noMatch: results.length === 0 }]);
    S.input = "";
    save("wemerson-history-busca", S.history);
    render();
  }

  app.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var a = el.getAttribute("data-action");
    var idx = el.getAttribute("data-idx");
    if (a === "theme") { S.themeName = S.themeName === "dark" ? "light" : "dark"; saveRaw("wemerson-theme", S.themeName); render(); }
    else if (a === "mode") {
      var target = el.getAttribute("data-mode");
      if (target === "interno" && !S.unlocked) { S.pinInput = ""; S.pinError = ""; S.mode = "interno-locked"; }
      else S.mode = target;
      render();
    }
    else if (a === "checkpin") {
      if (S.pinInput === INTERNAL_PASSWORD) { S.unlocked = true; S.mode = "interno"; S.pinError = ""; }
      else S.pinError = "Senha incorreta.";
      render();
    }
    else if (a === "togglecreds") { S.showCreds = !S.showCreds; render(); }
    else if (a === "togglepending") { S.showPending = !S.showPending; render(); }
    else if (a === "send") { doSearch(); }
    else if (a === "clear") { S.history = []; save("wemerson-history-busca", S.history); render(); }
    else if (a === "copy") {
      var it = S.history[+idx]; var ri = +el.getAttribute("data-ri");
      if (it && it.results && it.results[ri] && navigator.clipboard) navigator.clipboard.writeText(it.results[ri].answer);
    }
    else if (a === "topending") {
      var itm = S.history[+idx];
      if (itm) { S.pending = S.pending.concat([{ question: itm.question, mode: itm.mode, date: new Date().toISOString() }]); save("wemerson-pending", S.pending); S.showPending = true; render(); }
    }
    else if (a === "addcred") {
      if (!S.newCred.label.trim()) return;
      S.credentials = S.credentials.concat([Object.assign({}, S.newCred)]);
      save("wemerson-credentials", S.credentials);
      S.newCred = { label:"", login:"", senha:"", nota:"" }; render();
    }
    else if (a === "removecred") { S.credentials = S.credentials.filter(function (_, i) { return i !== +idx; }); save("wemerson-credentials", S.credentials); render(); }
    else if (a === "resolve") {
      var pItem = S.pending[+idx]; var ans = (S.answerDrafts[+idx] || "").trim();
      if (!ans) return;
      S.learned = S.learned.concat([{ question: pItem.question, answer: ans, agent: pItem.mode }]);
      S.pending = S.pending.filter(function (_, i) { return i !== +idx; });
      delete S.answerDrafts[+idx];
      save("wemerson-learned", S.learned); save("wemerson-pending", S.pending); render();
    }
    else if (a === "dismiss") { S.pending = S.pending.filter(function (_, i) { return i !== +idx; }); save("wemerson-pending", S.pending); render(); }
  });

  app.addEventListener("input", function (e) {
    var el = e.target.closest("[data-model]");
    if (!el) return;
    var m = el.getAttribute("data-model"); var v = el.value;
    if (m === "input") S.input = v;
    else if (m === "pin") S.pinInput = v;
    else if (m === "draft") S.answerDrafts[+el.getAttribute("data-idx")] = v;
    else if (m.indexOf("cred.") === 0) S.newCred[m.slice(5)] = v;
    if (m === "input") {
      var btn = app.querySelector('[data-action="send"]');
      if (btn) {
        var can = !!v.trim();
        btn.disabled = !can;
        btn.style.background = can ? (S.mode === "cliente" ? "var(--accentGreen)" : "var(--accentRed)") : "var(--inputBg)";
        btn.style.color = can ? "#fff" : "var(--faint)";
        btn.style.cursor = can ? "pointer" : "default";
      }
    }
  });

  app.addEventListener("keydown", function (e) {
    var el = e.target.closest("[data-enter]");
    if (!el) return;
    var kind = el.getAttribute("data-enter");
    if (kind === "send" && e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSearch(); }
    else if (kind === "pin" && e.key === "Enter") {
      if (S.pinInput === INTERNAL_PASSWORD) { S.unlocked = true; S.mode = "interno"; S.pinError = ""; }
      else S.pinError = "Senha incorreta.";
      render();
    }
  });

  render();
})();
</script>
